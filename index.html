<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICOM to PNG/JPG Converter</title>
    
    <script src="https://unpkg.com/dicom-parser@1.8.13/dist/dicomParser.min.js"></script>
    <script src="https://unpkg.com/cornerstone-core@2.6.1/dist/cornerstone.min.js"></script>
    <script src="https://unpkg.com/cornerstone-wado-image-loader@4.1.5/dist/cornerstoneWADOImageLoader.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        select, input[type="file"], button {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        /* ទីតាំងបង្ហាញរូបភាព */
        #dicomWrapper {
            width: 100%;
            height: 500px;
            position: relative;
            background-color: #000;
            display: none;
            border-radius: 4px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>កម្មវិធីបម្លែងឯកសារ DICOM</h2>
    
    <div class="controls">
        <input type="file" id="fileInput" accept=".dcm, .dicom, application/dicom">
        
        <select id="formatSelect">
            <option value="image/png">PNG</option>
            <option value="image/jpeg">JPG</option>
        </select>
        
        <button id="downloadBtn" style="display:none;">ទាញយករូបភាព</button>
    </div>

    <div id="dicomWrapper"></div>
</div>

<script>
    // កំណត់រចនាសម្ព័ន្ធបណ្ណាល័យ Cornerstone
    cornerstoneWADOImageLoader.external.cornerstone = cornerstone;
    cornerstoneWADOImageLoader.external.dicomParser = dicomParser;
    cornerstoneWADOImageLoader.configure({
        useWebWorkers: false
    });

    const fileInput = document.getElementById('fileInput');
    const formatSelect = document.getElementById('formatSelect');
    const downloadBtn = document.getElementById('downloadBtn');
    const element = document.getElementById('dicomWrapper');

    // បើកដំណើរការទីតាំងបង្ហាញរូបភាព
    cornerstone.enable(element);

    // មុខងារនៅពេលអ្នកប្រើប្រាស់ជ្រើសរើសឯកសារ
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // បង្កើត ID សម្រាប់ឯកសារនៅក្នុងប្រព័ន្ធរបស់ Cornerstone
        const imageId = cornerstoneWADOImageLoader.wadouri.fileManager.add(file);
        
        // អានទិន្នន័យ និងបង្ហាញរូបភាព
        cornerstone.loadImage(imageId).then(function(image) {
            element.style.display = 'block';
            cornerstone.displayImage(element, image);
            downloadBtn.style.display = 'inline-block';
        }).catch(function(err) {
            alert('មានបញ្ហាក្នុងការអានឯកសារ DICOM នេះ។ សូមពិនិត្យមើលឯកសារឡើងវិញ។');
            console.error(err);
        });
    });

    // មុខងារនៅពេលចុចប៊ូតុងទាញយក
    downloadBtn.addEventListener('click', function() {
        const canvas = element.querySelector('canvas');
        if (!canvas) {
            alert('មិនមានរូបភាពសម្រាប់ទាញយកទេ។');
            return;
        }

        const format = formatSelect.value;
        const extension = format === 'image/png' ? 'png' : 'jpg';
        
        // ទាញយកទិន្នន័យរូបភាពពី Canvas
        const dataURL = canvas.toDataURL(format, 1.0);

        // បង្កើតតំណភ្ជាប់ (Link) ដើម្បីទាញយកដោយស្វ័យប្រវត្តិ
        const link = document.createElement('a');
        link.download = `dicom_converted_image.${extension}`;
        link.href = dataURL;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });
</script>

</body>
</html>
